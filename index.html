<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小红书数据看板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f0f;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:24px}
h1{font-size:20px;font-weight:600;color:#fff;margin-bottom:4px}
.header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.source-select{background:#1a1a1a;border:1px solid #2a2a2a;color:#e0e0e0;font-size:13px;padding:6px 12px;border-radius:6px;cursor:pointer;outline:none}
.source-select:hover{border-color:#555}
.source-select:focus{border-color:#ff2442}
.subtitle{font-size:13px;color:#666;margin-bottom:16px}
.week-bar{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.week-bar label{font-size:12px;color:#888}
.week-btn{background:#1a1a1a;border:1px solid #2a2a2a;color:#888;font-size:11px;padding:4px 10px;border-radius:4px;cursor:pointer}
.week-btn.active{background:#ff2442;border-color:#ff2442;color:#fff}
.week-btn:hover{border-color:#555}
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px}
.kpi-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:16px}
.kpi-label{font-size:11px;color:#666;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.kpi-value{font-size:26px;font-weight:700;color:#fff}
.kpi-sub{font-size:12px;color:#888;margin-top:4px}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.chart-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:20px}
.chart-title{font-size:13px;font-weight:600;color:#ccc;margin-bottom:16px}
.chart-wrap{position:relative;height:220px}
.analysis-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:20px;margin-bottom:24px;position:relative;overflow:hidden}
.analysis-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(180deg,#ff2442,#ff6b81,#a855f7)}
.analysis-title{font-size:14px;font-weight:600;color:#ccc;margin-bottom:12px;padding-left:12px}
.analysis-body{font-size:13px;color:#bbb;line-height:1.8;padding-left:12px}
.analysis-footer{font-size:11px;color:#555;margin-top:12px;padding-left:12px}
/* ── 区块 2：账号基础信息卡片（v2.0） ── */
.profile-info-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:24px 28px;margin-bottom:20px;position:relative;overflow:hidden}
.profile-info-card::before{content:'';position:absolute;top:-80px;right:-40px;width:260px;height:260px;background:radial-gradient(circle,rgba(255,36,66,0.05) 0%,transparent 70%);pointer-events:none}
.profile-main{display:flex;align-items:flex-start;justify-content:space-between;position:relative;z-index:1}
.profile-left{display:flex;align-items:center;gap:18px}
.avatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#c53070,#8b2fc0);display:flex;align-items:center;justify-content:center;font-size:28px;color:#fff;font-weight:700;flex-shrink:0}
.profile-info h2{font-size:18px;font-weight:700;color:#fff;margin-bottom:5px;display:flex;align-items:center;gap:8px}
.profile-meta-row{display:flex;gap:14px;font-size:12px;color:#666;margin-bottom:6px;flex-wrap:wrap}
.profile-bio{font-size:12px;color:#666;max-width:400px;line-height:1.5}
.profile-stats{display:flex;gap:28px;align-items:flex-start;padding-top:4px}
.profile-stat-item{text-align:center;min-width:64px}
.profile-stat-num{font-size:24px;font-weight:700;color:#fff;line-height:1.2;font-variant-numeric:tabular-nums}
.profile-stat-num.accent{color:#ff4d6a}
.profile-stat-label{font-size:11px;color:#666;margin-top:3px}
.profile-badges{display:flex;gap:10px;margin-top:14px;padding-top:12px;border-top:1px solid #2a2a2a;position:relative;z-index:1}
.pbadge{font-size:12px;padding:4px 12px;border-radius:20px;font-weight:500}
.pbadge-tier{background:rgba(255,170,70,0.1);color:#ffaa46;border:1px solid rgba(255,170,70,0.2)}
.pbadge-format{background:rgba(100,180,255,0.08);color:#64b4ff;border:1px solid rgba(100,180,255,0.15)}

/* ── 区块 6：标签体系 2.0 网格列表 ── */
.tag-panel{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:20px 24px;margin-bottom:24px}
.tag-panel-heading{font-size:15px;font-weight:700;color:#ccc;margin-bottom:4px}
.tag-panel-sub{font-size:12px;color:#555;margin-bottom:16px}
.tag-grid{display:grid;grid-template-columns:130px 90px auto 90px auto 80px auto;column-gap:8px;border-top:1px solid #2a2a2a}
.tag-grid-row{display:contents}
.tag-grid-row>*{display:flex;align-items:center;min-height:42px;border-bottom:1px solid #2a2a2a}
.tag-grid-row:last-of-type>*{border-bottom:none}
.tag-cat{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600;padding-right:10px}
.tag-cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tag-attr-name{font-size:12px;color:#666;white-space:nowrap}
.tag-val{display:flex;align-items:center}
.tag-pill{font-size:12px;font-weight:600;padding:2px 8px;border-radius:4px;line-height:1.5;white-space:nowrap}
.tag-cat.tc-content{color:#ff6688}
.tag-cat.tc-style{color:#93c5fd}
.tag-cat.tc-seed{color:#6ee7b7}
.tag-cat.tc-interact{color:#c4b5fd}
.tag-cat.tc-health{color:#6ee7b7}
.tag-cat.tc-collab{color:#fde68a}
.tc-content .tag-pill{background:rgba(255,68,102,0.1);color:#ff6688}
.tc-style .tag-pill{background:rgba(91,141,239,0.1);color:#93c5fd}
.tc-seed .tag-pill{background:rgba(52,211,153,0.1);color:#6ee7b7}
.tc-interact .tag-pill{background:rgba(167,139,250,0.1);color:#c4b5fd}
.tc-health .tag-pill{background:rgba(16,185,129,0.1);color:#6ee7b7}
.tc-collab .tag-pill{background:rgba(251,191,36,0.1);color:#fde68a}
.tag-footer{font-size:11px;color:#555;margin-top:12px;padding-top:10px;border-top:1px solid #2a2a2a}
.tag-v1-fallback{font-size:12px;color:#666;padding:12px 0}

/* ── v1.0 旧样式保留（降级兼容） ── */
.profile-card-v1{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:20px;margin-bottom:24px}
.profile-title-v1{font-size:14px;font-weight:600;color:#ccc;margin-bottom:14px}
.profile-tags-v1{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.profile-footer-v1{font-size:11px;color:#555;margin-top:4px}
.table-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:20px}
.table-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.table-title{font-size:13px;font-weight:600;color:#ccc}
.sort-btns{display:flex;gap:6px}
.sort-btn{background:#2a2a2a;border:none;color:#888;font-size:11px;padding:4px 10px;border-radius:4px;cursor:pointer}
.sort-btn.active{background:#ff2442;color:#fff}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;color:#555;font-weight:500;padding:6px 8px;border-bottom:1px solid #2a2a2a}
td{padding:8px;border-bottom:1px solid #1e1e1e;color:#ccc}
tr:hover td{background:#222}
.note-title{max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#e0e0e0}
.num{text-align:right;font-variant-numeric:tabular-nums}
.top-row td{color:#fff}
.top-row td:first-child{border-left:2px solid #ff2442}
.score-high{color:#4ade80}
.score-mid{color:#facc15}
.score-low{color:#f87171}
/* 图表 Tab */
.chart-tabs-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:20px;margin-bottom:24px}
.chart-tabs{display:flex;gap:8px;margin-bottom:16px;border-bottom:1px solid #2a2a2a;padding-bottom:12px}
.chart-tab{background:none;border:none;color:#666;font-size:12px;padding:6px 14px;border-radius:6px;cursor:pointer;transition:all .2s}
.chart-tab:hover{color:#ccc;background:#222}
.chart-tab.active{background:#ff2442;color:#fff}
.chart-wrap-tall{position:relative;height:260px}
.growth-legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:12px;justify-content:center}
.growth-legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:#888}
.growth-legend-dot{width:10px;height:10px;border-radius:50%}
@media(max-width:640px){
  .chart-tabs{gap:4px}
  .chart-tab{font-size:11px;padding:5px 10px}
  .chart-wrap-tall{height:220px}
}

/* ── 平板端适配（769px ~ 1100px） ────────────── */
@media (max-width: 1100px) {
  .tag-grid { grid-template-columns: 100px 80px auto 80px auto 70px auto; }
  .tag-cat { font-size: 12px; }
  .profile-main { flex-direction: column; gap: 16px; }
  .profile-stats { align-self: flex-start; }
}

/* ── 移动端适配 ────────────────────────────────── */
@media (max-width: 768px) {
  body { padding: 14px 12px; overflow-x: hidden; }

  /* 区块 2：账号基础信息 */
  .profile-info-card { padding: 16px; }
  .profile-main { flex-direction: column; gap: 14px; }
  .profile-left { gap: 12px; }
  .avatar { width: 56px; height: 56px; font-size: 22px; }
  .profile-info h2 { font-size: 16px; }
  .profile-stats {
    align-self: stretch;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .profile-stat-item { text-align: center; }
  .profile-stat-num { font-size: 20px; }
  .profile-meta-row { flex-wrap: wrap; gap: 6px; font-size: 11px; }

  /* KPI：5张卡排成 3+2 */
  .kpi-grid {
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .kpi-card:nth-child(4),
  .kpi-card:nth-child(5) {
    grid-column: span 1;
  }
  .kpi-grid::after {
    content: '';
    display: none;
  }
  .kpi-card:nth-child(4) { grid-column: 1 / span 1; grid-row: 2; }
  .kpi-card:nth-child(5) { grid-column: 2 / span 1; grid-row: 2; }

  .kpi-value { font-size: 20px; }
  .kpi-label { font-size: 10px; }
  .kpi-sub   { font-size: 11px; }

  /* 图表：两列变一列 */
  .charts-grid { grid-template-columns: 1fr; gap: 12px; }

  /* 区块 6：标签区 - 堆叠布局 */
  .tag-panel { padding: 14px 16px; }
  .tag-grid {
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .tag-grid-row {
    display: flex !important;
    flex-direction: column;
    padding: 10px 0;
    border-bottom: 1px solid #2a2a2a;
  }
  .tag-grid-row:last-child { border-bottom: none; }
  .tag-grid-row > * {
    border-bottom: none !important;
    min-height: auto;
  }
  .tag-cat {
    width: auto;
    margin-bottom: 6px;
    padding-left: 0;
  }
  .tag-attr-name, .tag-val {
    display: inline-flex;
    align-items: center;
    min-height: auto;
    padding: 0;
  }
  .tag-grid-row {
    flex-wrap: wrap;
  }
  .tag-attr-name {
    margin-left: 10px;
    margin-bottom: 4px;
  }
  .tag-val {
    margin-right: 10px;
    margin-bottom: 4px;
  }

  /* 表格横向滚动 */
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; max-width: 100%; }
  table { min-width: 460px; width: max-content; }
  .note-title { max-width: 90px; }

  /* header：账号选择器换行 */
  .header-row { flex-wrap: wrap; gap: 8px; }

  /* 周筛选按钮更小 */
  .week-btn { font-size: 10px; padding: 3px 7px; }

  /* 分析卡片字号 */
  .analysis-body { font-size: 12px; line-height: 1.7; }
}

/* 平板端（769px ~ 900px）：KPI 改为 3 列 */
@media (min-width: 769px) and (max-width: 900px) {
  .kpi-grid { grid-template-columns: repeat(3, 1fr); }
  .kpi-card:nth-child(4) { grid-column: 1 / span 1; }
  .kpi-card:nth-child(5) { grid-column: 2 / span 1; }
}
</style>
</head>
<body>
<div class="header-row"><h1>小红书数据看板</h1><select id="source-select" class="source-select"></select></div>
<div id="profile-info-card"></div>
<div class="week-bar">
  <label>按周筛选：</label>
  <button class="week-btn active" onclick="filterWeek(null,this)">全部</button>
  <span id="week-btns"></span>
</div>
<div class="kpi-grid">
  <div class="kpi-card"><div class="kpi-label">总互动量</div><div class="kpi-value" id="kpi-engagement">-</div><div class="kpi-sub">所有笔记合计</div></div>
  <div class="kpi-card"><div class="kpi-label">平均收藏率</div><div class="kpi-value" id="kpi-save-rate">-</div><div class="kpi-sub">内容干货指数</div></div>
  <div class="kpi-card"><div class="kpi-label">平均互动指数</div><div class="kpi-value" id="kpi-quality">-</div><div class="kpi-sub">&gt;1.5为优质</div></div>
  <div class="kpi-card"><div class="kpi-label">平均评论/互动比</div><div class="kpi-value" id="kpi-comment-ratio">-</div><div class="kpi-sub">讨论深度</div></div>
  <div class="kpi-card"><div class="kpi-label">综合评分</div><div class="kpi-value" id="kpi-score">-</div><div class="kpi-sub">满分100</div></div>
</div>
<div class="chart-tabs-card">
  <div class="chart-tabs">
    <button class="chart-tab active" onclick="switchChartTab('trend',this)">📊 互动趋势</button>
    <button class="chart-tab" onclick="switchChartTab('structure',this)">🍩 互动结构</button>
    <button class="chart-tab" onclick="switchChartTab('growth',this)">📈 成长趋势</button>
  </div>
  <!-- 所有 Tab 内容始终渲染在 DOM 中，用 visibility+height 控制显示，避免 Chart.js 尺寸为0的问题 -->
  <div class="chart-tab-content" id="tab-trend">
    <div class="chart-title" style="margin-bottom:12px">互动量趋势（按发布时间）</div>
    <div class="chart-wrap"><canvas id="chart-trend"></canvas></div>
  </div>
  <div class="chart-tab-content" id="tab-structure" style="display:none">
    <div class="chart-title" style="margin-bottom:12px">互动结构分布</div>
    <div class="chart-wrap"><canvas id="chart-structure"></canvas></div>
  </div>
  <div class="chart-tab-content" id="tab-growth" style="display:none">
    <div class="chart-wrap-tall"><canvas id="chart-growth"></canvas></div>
    <div class="growth-legend" id="growth-legend"></div>
  </div>
</div>
<div class="analysis-card" id="analysis-card">
  <div class="analysis-title">🤖 智能分析</div>
  <div class="analysis-body" id="analysis-body">暂无分析数据</div>
  <div class="analysis-footer">由 AI 基于公开数据生成</div>
</div>
<div id="tag-panel"></div>
<div class="table-card">
  <div class="table-header">
    <div class="table-title">笔记表现排行</div>
    <div class="sort-btns">
      <button class="sort-btn active" onclick="sortTable('engage',this)">互动量</button>
      <button class="sort-btn" onclick="sortTable('save_rate',this)">收藏率</button>
      <button class="sort-btn" onclick="sortTable('quality_index',this)">互动质量</button>
      <button class="sort-btn" onclick="sortTable('score',this)">综合评分</button>
    </div>
  </div>
  <div class="table-wrap"><table>
    <thead><tr>
      <th>#</th><th>笔记标题</th><th class="num">点赞</th>
      <th class="num">收藏</th><th class="num">评论</th><th class="num">分享</th>
      <th class="num">收藏率</th><th class="num">互动质量</th><th class="num">综合评分</th>
      <th>日期</th>
    </tr></thead>
    <tbody id="table-body"></tbody>
  </table></div>
</div>
<script src="chart.min.js"></script>
<script src="sources/registry.js"></script>
<script src="sources/liangkeban_data.js"></script>
<script src="sources/caiwenjing_data.js"></script>
<script src="sources/chenzihaha_data.js"></script>
<script src="sources/zhangzhala_data.js"></script>
<script src="sources/lumoseducation_data.js"></script>
<script src="sources/liangkeban_history.js"></script>
<script src="sources/caiwenjing_history.js"></script>
<script src="sources/chenzihaha_history.js"></script>
<script src="sources/zhangzhala_history.js"></script>
<script src="sources/lumoseducation_history.js"></script>
<script src="app.js"></script>
</body>
</html>
